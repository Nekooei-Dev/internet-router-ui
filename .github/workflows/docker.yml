name: Build and Push Docker Image

on:
  push:
    branches:
      - main

permissions:
  packages: write  # دسترسی برای GitHub Container Registry

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push Docker image to Docker Hub
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            -t nekooeidev/internet-router-ui:latest .

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push Docker image to GitHub Container Registry
        run: |
          docker pull nekooeidev/internet-router-ui:latest
          docker tag nekooeidev/internet-router-ui:latest ghcr.io/Nekooei-Dev/internet-router-ui:latest
          docker push ghcr.io/Nekooei-Dev/internet-router-ui:latest
