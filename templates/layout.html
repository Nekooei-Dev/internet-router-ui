<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "MikroTik UI" }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.rtl.min.css" rel="stylesheet" integrity="sha384-..." crossorigin="anonymous">
    <style>
      body {
        background-color: #f8f9fa;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">MikroTik UI</a>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            {% if session.get('user_type') == 'admin' %}
              <li class="nav-item"><a class="nav-link" href="/admin">پنل ادمین</a></li>
              <li class="nav-item"><a class="nav-link" href="/check-api">وضعیت API</a></li>
            {% elif session.get('user_type') == 'user' %}
              <li class="nav-item"><a class="nav-link" href="/change-internet">تغییر اینترنت</a></li>
              <li class="nav-item"><a class="nav-link" href="/user-status">وضعیت من</a></li>
            {% endif %}
          </ul>
          {% if session.get('user_type') %}
            <a class="btn btn-outline-light" href="/logout">خروج</a>
          {% endif %}
        </div>
      </div>
    </nav>
    <div class="container">
      {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-..." crossorigin="anonymous"></script>
  </body>
</html>
