<!doctype html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "مدیریت اینترنت" }}</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" integrity="sha384-Qxv5gkPJEfJIF3wJZ8PyiTqf9Snt0CK0e2TIUv7nFh+K/8S5Z7zh5NhyZ4LUF+SA" crossorigin="anonymous">
</head>
<body class="bg-light text-dark">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">🛰️ مدیریت اینترنت</a>
        {% if session.get('authenticated') %}
            <a class="btn btn-outline-light" href="/logout">خروج</a>
        {% endif %}
    </div>
</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
