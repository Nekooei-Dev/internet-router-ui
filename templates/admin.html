<!DOCTYPE html>
<html>
<head>
    <title>پنل ادمین</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<h2>🛠️ پنل مدیریت</h2>

<form method="post">
  <label>انتخاب اینترنت پیش‌فرض:</label>
  <select name="default_route">
    <option value="irancell" {% if current_default == "irancell" %}selected{% endif %}>ایرانسل</option>
    <option value="hamrahaval" {% if current_default == "hamrahaval" %}selected{% endif %}>همراه اول</option>
    <option value="adsl" {% if current_default == "adsl" %}selected{% endif %}>ADSL</option>
    <option value="anten" {% if current_default == "anten" %}selected{% endif %}>آنتن</option>
  </select>
  <input type="submit" value="اعمال">
</form>

<p>{{ message }}</p>
<p><a href="/logout">🚪 خروج</a></p>
</body>
</html>
