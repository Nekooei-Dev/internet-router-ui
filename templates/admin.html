<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <title>پنل مدیریت</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <link href="{{ url_for('static', filename='custom.css') }}" rel="stylesheet" />
</head>
<body class="bg-light">
    <div class="container mt-4">
        <h3><i class="fas fa-user-shield"></i> پنل مدیریت</h3>
        <hr />
        <h5>لیست کاربران و اینترنت‌های آنها</h5>
        <table class="table table-striped table-bordered">
            <thead>
                <tr>
                    <th>آی‌پی</th>
                    <th>مک آدرس</th>
                    <th>فعال</th>
                    <th>اینترنت فعلی</th>
                    <th>تغییر اینترنت</th>
                    <th>حذف اینترنت</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user.ip }}</td>
                    <td>{{ user.mac }}</td>
                    <td>{{ user.active }}</td>
                    <td>{{ user.current_internet }}</td>
                    <td>
                        <form method="post" class="d-flex gap-2 align-items-center">
                            <input type="hidden" name="action" value="change_user_internet" />
                            <input type="hidden" name="user_ip" value="{{ user.ip }}" />
                            <select name="new_internet" class="form-select form-select-sm" required>
                                {% for key, val in routing_tables.items() %}
                                <option value="{{ key }}" {% if val == user.current_internet %}selected{% endif %}>{{ val }}</option>
                                {% endfor %}
                            </select>
                            <button type="submit" class="btn btn-sm btn-success"><i class="fas fa-exchange-alt"></i></button>
                        </form>
                    </td>
                    <td>
                        <form method="post" class="d-inline">
                            <input type="hidden" name="action" value="change_user_internet" />
                            <input type="hidden" name="user_ip" value="{{ user.ip }}" />
                            <input type="hidden" name="new_internet" value="" />
                            <button type="submit" class="btn btn-sm btn-danger" title="حذف اینترنت"><i class="fas fa-trash-alt"></i></button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <hr />
        <h5>تغییر اینترنت پیش‌فرض</h5>
        <form method="post" class="d-flex gap-2 align-items-center w-50">
            <input type="hidden" name="action" value="change_default_internet" />
            <select name="default_internet" class="form-select" required>
                {% for key, val in routing_tables.items() %}
                <option value="{{ key }}" {% if key == default_internet %}selected{% endif %}>{{ val }}</option>
                {% endfor %}
            </select>
            <button type="submit" class="btn btn-primary">اعمال تغییر</button>
        </form>

        <hr />
        <a href="{{ url_for('common.logout') }}" class="btn btn-secondary"><i class="fas fa-sign-out-alt"></i> خروج</a>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
