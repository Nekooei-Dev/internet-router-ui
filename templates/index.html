<h2>اینترنت فعلی شما:</h2>
{% if current_inet %}
  <p style="color: green;">{{ interface_marks[current_inet]["name"] }}</p>
{% else %}
  <p style="color: red;">نامشخص (هیچ روتی برای شما تنظیم نشده)</p>
{% endif %}

<h3>انتخاب اینترنت:</h3>
<ul>
  {% for key, val in interface_marks.items() %}
    <li>
      <a href="/set?inet={{ key }}">{{ val["name"] }}</a>
    </li>
  {% endfor %}
</ul>
