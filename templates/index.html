<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>انتخاب اینترنت</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(145deg, #e9f0ff, #ffffff);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Tahoma', sans-serif;
    }
    .card {
      border-radius: 1rem;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .btn {
      font-size: 1.1rem;
      padding: 10px 30px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card p-4 text-center">
      <h3 class="mb-4 text-primary">🔌 انتخاب اینترنت دلخواه</h3>
      <p class="mb-3 text-muted">لطفاً یکی از گزینه‌های زیر را انتخاب کنید:</p>
      <div class="d-grid gap-3 col-6 mx-auto">
        <button class="btn btn-outline-primary" onclick="selectInternet(1)">اینترنت ۱</button>
        <button class="btn btn-outline-success" onclick="selectInternet(2)">اینترنت ۲</button>
        <button class="btn btn-outline-warning" onclick="selectInternet(3)">اینترنت ۳</button>
        <button class="btn btn-outline-danger" onclick="selectInternet(4)">اینترنت ۴</button>
      </div>
      <div class="mt-4">
        <span id="result" class="fw-bold text-success"></span>
      </div>
    </div>
  </div>

  <script>
    function selectInternet(inet) {
      fetch(`/set?inet=${inet}`)
        .then(res => res.text())
        .then(data => {
          document.getElementById('result').innerText = "✅ اینترنت با موفقیت تغییر یافت.";
        })
        .catch(err => {
          document.getElementById('result').innerText = "❌ خطا در تغییر اینترنت.";
        });
    }
  </script>
</body>
</html>
