<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <title>صفحه اصلی</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
</head>
<body class="bg-light">
    <div class="container mt-4">
        <h3><i class="fas fa-home"></i> خوش آمدید</h3>
        <p>شما وارد شده‌اید.</p>
        {% if session.role == "admin" %}
        <a href="{{ url_for('admin.admin_panel') }}" class="btn btn-primary"><i class="fas fa-user-shield"></i> پنل مدیریت</a>
        {% elif session.role == "user" %}
        <a href="{{ url_for('user.user_panel') }}" class="btn btn-primary"><i class="fas fa-user"></i> پنل کاربر</a>
        {% endif %}
        <a href="{{ url_for('common.logout') }}" class="btn btn-secondary ms-2"><i class="fas fa-sign-out-alt"></i> خروج</a>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
