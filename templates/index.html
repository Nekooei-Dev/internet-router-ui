<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>پنل مدیریت میکروتیک</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet" />
</head>
<body>
<div class="container">
    <h1 class="mb-4">پنل مدیریت میکروتیک</h1>

    <div id="alertBox"></div>

    <form id="mangleForm" method="POST" action="{{ url_for('update_mangle') }}">
        <div class="mb-3">
            <label for="user_ip" class="form-label">آدرس IP کاربر</label>
            <input type="text" class="form-control" id="user_ip" name="user_ip" placeholder="مثال: 192.168.88.100" required />
        </div>
        <div class="mb-3">
            <label for="comment" class="form-label">توضیحات (کامنت)</label>
            <input type="text" class="form-control" id="comment" name="comment" placeholder="مثلا: کاربر شماره 1" />
        </div>
        <button type="submit" class="btn btn-primary">ثبت قانون Mangle</button>
    </form>

    <div id="loadingSpinner" class="loading-spinner">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">در حال بارگذاری...</span>
        </div>
    </div>

    <hr />

    <a href="{{ url_for('configure_settings') }}" class="btn btn-secondary mb-3">ویرایش تنظیمات اتصال</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
