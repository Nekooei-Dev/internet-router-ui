<!DOCTYPE html>
<html>
<head>
    <title>انتخاب اینترنت</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<h2>🌐 انتخاب اینترنت برای IP {{ ip }}</h2>
<form method="post">
  <select name="route" required>
    <option value="irancell">ایرانسل</option>
    <option value="hamrahaval">همراه اول</option>
    <option value="adsl">ADSL</option>
    <option value="anten">آنتن</option>
  </select>
  <input type="submit" value="اعمال">
</form>
{% if message %}
<p>{{ message }}</p>
{% endif %}
<footer>ساخته شده و پشتیبانی توسط مصطفی نکویی</footer>
</body>
</html>
