{% extends 'layout.html' %}
{% block title %}صفحه اصلی{% endblock %}
{% block content %}

<div class="text-center mt-5">
    <h1>🎉 خوش آمدید</h1>
    <p class="lead">از اینجا می‌توانید اینترنت خود را مدیریت کنید</p>
    
    <div class="d-grid gap-2 col-6 mx-auto mt-4">
        <a href="{{ url_for('change_internet') }}" class="btn btn-primary">📶 تغییر اینترنت</a>
        <a href="{{ url_for('user_status') }}" class="btn btn-info">🔍 وضعیت اینترنت</a>
        {% if session.get('is_admin') %}
        <a href="{{ url_for('admin') }}" class="btn btn-warning">🛠 مدیریت کاربران</a>
        {% endif %}
        <a href="{{ url_for('about') }}" class="btn btn-secondary">👤 درباره ما</a>
    </div>
</div>

{% endblock %}
