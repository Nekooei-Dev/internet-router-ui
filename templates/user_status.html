{% extends 'layout.html' %}
{% block content %}
<h3 class="mb-4">وضعیت اتصال شما</h3>
{% if rule %}
  <div class="card">
    <div class="card-body">
      <p><strong>آدرس IP:</strong> {{ rule['src-address'] }}</p>
      <p><strong>مسیر فعلی:</strong> {{ rule['new-routing-mark'] }}</p>
    </div>
  </div>
{% else %}
  <div class="alert alert-warning">هیچ قانونی برای IP شما یافت نشد.</div>
{% endif %}
{% endblock %}
