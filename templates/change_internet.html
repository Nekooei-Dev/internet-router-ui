
<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <title>تغییر اینترنت</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h3>تغییر اینترنت</h3>
    {% if message %}
        <div class="alert alert-info">{{ message }}</div>
    {% endif %}
    <form method="post">
        <div class="mb-3">
            <label class="form-label">انتخاب اینترنت:</label>
            <select name="inet" class="form-select">
                {% for key, val in interfaces.items() %}
                    <option value="{{ key }}">{{ val.routing_mark }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-success">اعمال تغییر</button>
    </form>
    <a href="/" class="btn btn-secondary mt-3">بازگشت</a>
</body>
</html>
