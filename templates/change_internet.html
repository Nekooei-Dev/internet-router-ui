{% extends "layout.html" %}
{% block title %}تغییر اینترنت{% endblock %}
{% block content %}
<h2>تغییر اینترنت</h2>
{% if message %}
<div class="alert alert-info">{{ message }}</div>
{% endif %}
<form method="post">
    <div class="mb-3">
        <label for="inet" class="form-label">انتخاب اینترنت:</label>
        <select class="form-select" id="inet" name="inet">
            {% for key, value in interfaces.items() %}
            <option value="{{ key }}">{{ value }}</option>
            {% endfor %}
        </select>
    </div>
    <button type="submit" class="btn btn-success">تغییر</button>
</form>
<a href="/" class="btn btn-primary mt-3">بازگشت</a>
{% endblock %}
