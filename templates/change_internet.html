<!DOCTYPE html>
<html>
<head><title>تغییر اینترنت</title></head>
<body>
    <h2>انتخاب اینترنت جدید</h2>
    {% if message %}<p>{{ message }}</p>{% endif %}
    <form method="post">
        {% for key, value in interfaces.items() %}
            <input type="radio" name="inet" value="{{ key }}" required /> {{ value.routing_mark }}<br>
        {% endfor %}
        <button type="submit">ثبت</button>
    </form>
</body>
</html>
