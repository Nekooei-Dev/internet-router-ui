<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <title>تغییر اینترنت</title>
</head>
<body>
    <h2>تغییر مسیر اینترنت</h2>
    {% if message %}
        <p style="color: {{ 'green' if 'با موفقیت' in message else 'red' }}">{{ message }}</p>
    {% endif %}
    <form method="POST">
        <select name="inet" required>
            {% for key, info in interfaces.items() %}
                <option value="{{ key }}">{{ info.routing_mark }}</option>
            {% endfor %}
        </select>
        <button type="submit">اعمال</button>
    </form>
    <br>
    <a href="/">بازگشت به صفحه اصلی</a>
</body>
</html>
