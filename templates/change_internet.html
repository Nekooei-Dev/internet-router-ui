<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>تغییر اینترنت</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
<style> body { direction: rtl; padding: 30px; background: #fff; } </style>
</head>
<body>
<div class="container" style="max-width: 500px;">
  <h2 class="mb-4">تغییر اینترنت شما</h2>
  {% if message %}
    <div class="alert alert-info">{{ message }}</div>
  {% endif %}
  <form method="post">
    <div class="mb-3">
      <label for="inet" class="form-label">اینترنت مورد نظر را انتخاب کنید</label>
      <select class="form-select" id="inet" name="inet" required>
        <option value="" selected disabled>انتخاب کنید</option>
        {% for key, val in interfaces.items() %}
          <option value="{{ key }}">{{ val.routing_mark }}</option>
        {% endfor %}
      </select>
    </div>
    <button type="submit" class="btn btn-success w-100">تغییر اینترنت</button>
  </form>
  <a href="/" class="btn btn-secondary mt-3">بازگشت به داشبورد</a>
</div>
</body>
</html>
