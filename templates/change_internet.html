{% extends 'layout.html' %}
{% block content %}
<h3 class="mb-4">تغییر مسیر اینترنت</h3>
<form method="post">
  <div class="mb-3">
    <label for="interface" class="form-label">انتخاب مسیر</label>
    <select class="form-select" id="interface" name="interface" required>
      {% for key, value in interfaces.items() %}
        <option value="{{ key }}">{{ value }}</option>
      {% endfor %}
    </select>
  </div>
  <button type="submit" class="btn btn-success">اعمال تغییر</button>
</form>
{% endblock %}
