<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>تنظیمات اتصال میکروتیک</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet" />
</head>
<body>
<div class="container">
    <h1 class="mb-4">تنظیمات اتصال به میکروتیک</h1>

    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('configure_settings') }}">
        <div class="mb-3">
            <label for="ip" class="form-label">آدرس IP روتر</label>
            <input type="text" class="form-control" id="ip" name="ip" value="{{ settings.ip }}" required />
        </div>
        <div class="mb-3">
            <label for="username" class="form-label">نام کاربری</label>
            <input type="text" class="form-control" id="username" name="username" value="{{ settings.username }}" required />
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">کلمه عبور</label>
            <input type="password" class="form-control" id="password" name="password" value="{{ settings.password }}" required />
        </div>
        <div class="mb-3">
            <label for="interface" class="form-label">اینترفیس</label>
            <input type="text" class="form-control" id="interface" name="interface" value="{{ settings.interface }}" required />
        </div>

        <button type="submit" class="btn btn-primary">ذخیره تنظیمات</button>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">بازگشت</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
