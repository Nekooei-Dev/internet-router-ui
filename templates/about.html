<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>درباره من</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v30.1.0/dist/font-face.css" rel="stylesheet" />
    <style>
        body {
            font-family: Vazir, sans-serif;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
    <div class="container-fluid">
        <a class="navbar-brand" href="{{ url_for('index') }}"><i class="fas fa-globe me-1"></i> مدیریت اینترنت</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="{{ url_for('about') }}">درباره</a></li>
                {% if session.get('role') == 'admin' %}
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('admin') }}">مدیریت</a></li>
                {% elif session.get('role') == 'user' %}
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('user') }}">کاربر</a></li>
                {% endif %}
                <li class="nav-item"><a class="nav-link" href="{{ url_for('logout') }}">خروج</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="mb-4 text-primary"><i class="fas fa-user me-2"></i> درباره من</h2>
        <div class="d-flex align-items-center flex-column flex-md-row gap-4">
            <img src="{{ url_for('static', filename='images/myphoto.jpg') }}" alt="عکس من" class="img-thumbnail shadow" style="max-width: 200px;">
            <div>
                <p><i class="fas fa-user-circle me-1 text-secondary"></i> <strong>نام:</strong> نکوئی</p>
                <p><i class="fas fa-envelope me-1 text-secondary"></i> <strong>ایمیل:</strong> <a href="mailto:nek@example.com">nek@example.com</a></p>
                <p><i class="fas fa-phone me-1 text-secondary"></i> <strong>تلفن:</strong> 0912xxxxxxx</p>
                <p><i class="fab fa-instagram me-1 text-secondary"></i> <strong>اینستاگرام:</strong> <a href="https://instagram.com/nek" target="_blank">@nek</a></p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
