<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>پنل کاربر</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">
    <div class="container py-4">
        <h3><i class="fas fa-wifi"></i> اینترنت فعلی شما: {{ current_internet }}</h3>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
          {% endfor %}
        {% endwith %}

        <form method="POST" class="mt-4">
            <label for="internet" class="form-label">انتخاب اینترنت جدید</label>
            <select name="internet" id="internet" class="form-select" required>
                {% for key, val in routing_tables.items() %}
                    <option value="{{ key }}" {% if val == current_internet %}selected{% endif %}>{{ val }}</option>
                {% endfor %}
            </select>
            <button type="submit" class="btn btn-primary mt-3">تغییر اینترنت</button>
        </form>

        <a href="{{ url_for('common.logout') }}" class="btn btn-secondary mt-4">خروج</a>
    </div>
</body>
</html>
