{% extends "base.html" %}
{% block title %}داشبورد{% endblock %}

{% block content %}
<div class="container mt-5 text-center">
  <h2 class="mb-4">🎉 خوش آمدید!</h2>
  <p class="lead">شما به عنوان <strong>{{ 'مدیر' if role == 'admin' else 'کاربر' }}</strong> وارد شدید.</p>

  <div class="row justify-content-center mt-4 g-3">
    {% if role == 'admin' %}
      <div class="col-md-3">
        <a href="{{ url_for('admin.dashboard') }}" class="btn btn-outline-primary w-100">
          <i class="fas fa-tools"></i> بخش مدیریت
        </a>
      </div>
      <div class="col-md-3">
        <a href="{{ url_for('admin.settings') }}" class="btn btn-outline-secondary w-100">
          <i class="fas fa-cogs"></i> تنظیمات
        </a>
      </div>
    {% elif role == 'user' %}
      <div class="col-md-4">
        <a href="{{ url_for('user.dashboard') }}" class="btn btn-outline-info w-100">
          <i class="fas fa-wifi"></i> پنل کاربر
        </a>
      </div>
    {% endif %}
  </div>
</div>
{% endblock %}
