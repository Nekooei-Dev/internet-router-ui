<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>داشبورد</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.rtl.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/fontawesome.min.css') }}">
</head>
<body class="bg-light">

{% include 'navbar.html' %}

<div class="container mt-5">
  <div class="text-center">
    <h2 class="mb-4">🎉 خوش آمدید!</h2>
    <p>شما به عنوان <strong>{{ 'مدیر' if role == 'admin' else 'کاربر' }}</strong> وارد شدید.</p>

    <div class="row justify-content-center mt-4">
      {% if role == 'admin' %}
        <div class="col-md-3">
          <a href="{{ url_for('admin.admin_panel') }}" class="btn btn-outline-primary w-100 my-2">
            <i class="fas fa-tools me-2"></i> مدیریت اینترنت کاربران
          </a>
          <a href="{{ url_for('settings.settings') }}" class="btn btn-outline-warning w-100 my-2">
            <i class="fas fa-cogs me-2"></i> تنظیمات اولیه
          </a>
        </div>
      {% elif role == 'user' %}
        <div class="col-md-3">
          <a href="{{ url_for('user.user_panel') }}" class="btn btn-outline-success w-100 my-2">
            <i class="fas fa-wifi me-2"></i> انتخاب اینترنت دلخواه
          </a>
        </div>
      {% endif %}

      <div class="col-md-3">
        <a href="{{ url_for('about') }}" class="btn btn-outline-info w-100 my-2">
          <i class="fas fa-info-circle me-2"></i> درباره
        </a>
        <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-danger w-100 my-2">
          <i class="fas fa-sign-out-alt me-2"></i> خروج از حساب
        </a>
      </div>
    </div>
  </div>
</div>

{% include 'footer.html' %}
</body>
</html>
